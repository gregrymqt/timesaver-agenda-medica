<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Agenda Médica TimeSaver</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tabulator.js CSS -->
    <link href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🩺 TimeSaver Agenda</a>
            <div class="d-flex align-items-center">
                <span class="navbar-text me-3 text-white">Olá, <strong>{{ user_nome }}</strong></span>
                <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">Sair</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-3">
            <div class="col-md-8">
                <h4 class="text-secondary">Consultas Agendadas</h4>
            </div>
            <div class="col-md-4">
                <!-- Filtro de Busca Global em Tempo Real -->
                <input type="text" id="search-input" class="form-control" placeholder="🔍 Buscar por Paciente, CPF ou Médico...">
            </div>
        </div>

        <!-- Alerta de Erro de Conexão com a API -->
        <div id="api-error-alert" class="alert alert-warning d-none" role="alert">
            <span id="api-error-message"></span>
        </div>

        <!-- Tabela Renderizada pelo Tabulator.js -->
        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div id="agenda-table"></div>
            </div>
        </div>
    </div>

    <!-- Tabulator.js e Script da Aplicação -->
    <script src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
